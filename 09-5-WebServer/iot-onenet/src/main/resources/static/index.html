<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>机柜状态检测与远程运维</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #3388BB;
            --secondary-color: #6b8cae;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
            --light-bg: #f5f7fa;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--light-bg);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: #fff;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 25px;
            transition: transform .3s ease, box-shadow .3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
        }

        /* 控件样式（参照 test.html） */
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        select, input[type="number"], .select-like {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: var(--border-radius);
            font-size: 1rem; margin-bottom: 15px; transition: border 0.3s ease;
        }
        select:focus, input[type="number"]:focus {
            outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(51, 136, 187, 0.2);
        }
        .btn {
            display: inline-block; padding: 10px 20px; background-color: var(--primary-color); color: #fff;
            border: none; border-radius: var(--border-radius); font-size: 1rem; cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn:hover { background-color: #2b79a8; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .status-message { margin-top: 10px; display: none; }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .card-header i {
            font-size: 1.5rem;
            color: var(--secondary-color);
            margin-right: 10px;
        }

        .card-header h3 {
            font-size: 1.3rem;
            color: var(--primary-color);
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: auto;
            background-color: #ccc;
        }

        .status-active {
            background-color: var(--success-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1
            }

            50% {
                opacity: .5
            }

            100% {
                opacity: 1
            }
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(74, 111, 165, .05);
            border-radius: 6px;
        }

        .data-label {
            font-weight: 500;
            color: #555;
        }

        .data-value {
            font-weight: 700;
            color: var(--primary-color);
        }

        .data-unit {
            color: #777;
            font-size: .9em;
            margin-left: 3px;
        }

        .led-pill {
            padding: 3px 10px;
            border-radius: 999px;
            color: #fff;
            font-weight: 600;
            font-size: .9rem;
        }

        .led-on {
            background: var(--success-color);
        }

        .led-off {
            background: var(--danger-color);
        }


        .last-updated {
            text-align: right;
            font-size: .85rem;
            color: #888;
            margin-top: 10px;
        }

        .muted {
            color: #888;
        }
    </style>
    <!-- 页面会请求 /api/status 获取数据，自动适配服务器地址 -->
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <base href="." />
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-server"></i> 机柜状态检测与远程运维</h1>
            <p class="muted">实时监测机柜环境与运行状态</p>
        </header>

        <div class="dashboard">
            <!-- 左侧：机柜环境 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-thermometer-three-quarters"></i>
                    <h3>机柜环境</h3>
                    <span id="conn-indicator" class="status-indicator"></span>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-thermometer-half"></i> 温度</span>
                    <span><span class="data-value" id="temperature-value">--</span><span class="data-unit"
                            id="temperature-unit">°C</span></span>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-tint"></i> 湿度</span>
                    <span><span class="data-value" id="humidity-value">--</span><span class="data-unit"
                            id="humidity-unit">%</span></span>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-sun"></i> 光照模拟量</span>
                    <span><span class="data-value" id="light-value">--</span><span class="data-unit"
                            id="light-unit">Lux</span></span>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-smog"></i> 烟雾浓度</span>
                    <span><span class="data-value" id="mq2-value">--</span><span class="data-unit"
                            id="mq2-unit">ppm</span></span>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-microchip"></i> 设备信息</span>
                    <span><span id="device-name" class="data-value">--</span> <span id="device-id"
                            class="data-unit">(id: --)</span></span>
                </div>

                <div class="last-updated">
                    <i class="fas fa-sync-alt"></i> 最后更新: <span id="last-updated-time">等待数据…</span>
                </div>
            </div>

            <!-- 右侧：运行状态 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-heartbeat"></i>
                    <h3>运行状态</h3>
                </div>

                <div class="data-item" style="flex-direction: column; align-items: flex-start; padding: 15px;">
                    <span class="data-label" style="margin-bottom: 10px;"><i class="fas fa-shield-alt"></i> 系统状态</span>
                    <div id="system-status" style="width: 100%; padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; font-size: 1.1rem;">
                        等待数据...
                    </div>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-lightbulb"></i> LED 指示</span>
                    <span id="led-indicator" class="led-pill led-off">--</span>
                </div>

                <div class="data-item">
                    <span class="data-label"><i class="fas fa-bell"></i> 蜂鸣器</span>
                    <span id="buzzer-status" class="led-pill led-off">--</span>
                </div>

                <div class="last-updated" style="margin-top: 20px;">
                    <i class="fas fa-info-circle"></i> 状态由设备自动上报
                </div>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        fetch('/api/check-login')
            .then(res => res.json())
            .then(data => {
                if (!data.loggedIn) {
                    window.location.href = '/login.html';
                }
            })
            .catch(() => {
                window.location.href = '/login.html';
            });

        // 使用相对路径，自动适配服务器地址
        const API_URL = '/api/status';

        function formatRelativeTime(date) {
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            if (seconds < 5) return '刚刚';
            if (seconds < 60) return `${seconds}秒前`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}分钟前`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}小时前`;
            const days = Math.floor(hours / 24);
            return `${days}天前`;
        }

        function setConnIndicator(active) {
            const el = document.getElementById('conn-indicator');
            if (!el) return;
            el.classList.toggle('status-active', !!active);
        }

        async function refresh() {
            try {
                const resp = await fetch(API_URL, { cache: 'no-store' });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                setConnIndicator(true);

                // 设备
                document.getElementById('device-name').textContent = data.deviceName || '--';
                document.getElementById('device-id').textContent = data.deviceId ? `(id: ${data.deviceId})` : '(id: --)';

                // 温度
                const t = data.temperature || {};
                document.getElementById('temperature-value').textContent = t.value != null ? t.value : '--';
                document.getElementById('temperature-unit').textContent = t.unit || '°C';

                // 湿度
                const h = data.humidity || {};
                document.getElementById('humidity-value').textContent = h.value != null ? h.value : '--';
                document.getElementById('humidity-unit').textContent = h.unit || '%';

                // 光照
                const l = data.light || {};
                document.getElementById('light-value').textContent = l.value != null ? l.value : '--';
                document.getElementById('light-unit').textContent = l.unit || 'Lux';

                // 烟雾浓度
                const m = data.mq2 || {};
                document.getElementById('mq2-value').textContent = m.value != null ? m.value : '--';
                document.getElementById('mq2-unit').textContent = m.unit || 'ppm';

                // Error状态解析
                const err = data.error || {};
                const errorValue = err.value;
                const systemStatusEl = document.getElementById('system-status');
                const ledIndicatorEl = document.getElementById('led-indicator');
                const buzzerStatusEl = document.getElementById('buzzer-status');

                if (errorValue === 0) {
                    // 安全运行
                    systemStatusEl.textContent = '✓ 安全运行';
                    systemStatusEl.style.background = 'linear-gradient(135deg, #4caf50, #66bb6a)';
                    systemStatusEl.style.color = 'white';
                    systemStatusEl.style.boxShadow = '0 4px 15px rgba(76, 175, 80, 0.3)';
                    
                    ledIndicatorEl.textContent = '绿色';
                    ledIndicatorEl.className = 'led-pill';
                    ledIndicatorEl.style.background = '#4caf50';
                    ledIndicatorEl.style.color = 'white';
                    
                    buzzerStatusEl.textContent = 'OFF';
                    buzzerStatusEl.className = 'led-pill';
                    buzzerStatusEl.style.background = '#9e9e9e';
                    buzzerStatusEl.style.color = 'white';
                } else if (errorValue === 1) {
                    // 警告
                    systemStatusEl.textContent = '⚠ 警告';
                    systemStatusEl.style.background = 'linear-gradient(135deg, #ff9800, #ffa726)';
                    systemStatusEl.style.color = 'white';
                    systemStatusEl.style.boxShadow = '0 4px 15px rgba(255, 152, 0, 0.3)';
                    
                    ledIndicatorEl.textContent = '黄色';
                    ledIndicatorEl.className = 'led-pill';
                    ledIndicatorEl.style.background = '#ff9800';
                    ledIndicatorEl.style.color = 'white';
                    
                    buzzerStatusEl.textContent = 'ON';
                    buzzerStatusEl.className = 'led-pill';
                    buzzerStatusEl.style.background = '#ff9800';
                    buzzerStatusEl.style.color = 'white';
                } else if (errorValue === 2) {
                    // 严重警报
                    systemStatusEl.textContent = '✕ 严重警报';
                    systemStatusEl.style.background = 'linear-gradient(135deg, #f44336, #e57373)';
                    systemStatusEl.style.color = 'white';
                    systemStatusEl.style.boxShadow = '0 4px 15px rgba(244, 67, 54, 0.3)';
                    
                    ledIndicatorEl.textContent = '红色';
                    ledIndicatorEl.className = 'led-pill';
                    ledIndicatorEl.style.background = '#f44336';
                    ledIndicatorEl.style.color = 'white';
                    
                    buzzerStatusEl.textContent = 'ON';
                    buzzerStatusEl.className = 'led-pill';
                    buzzerStatusEl.style.background = '#f44336';
                    buzzerStatusEl.style.color = 'white';
                } else {
                    // 未知状态
                    systemStatusEl.textContent = '-- 未知状态 --';
                    systemStatusEl.style.background = '#e0e0e0';
                    systemStatusEl.style.color = '#666';
                    systemStatusEl.style.boxShadow = 'none';
                    
                    ledIndicatorEl.textContent = '--';
                    ledIndicatorEl.className = 'led-pill led-off';
                    ledIndicatorEl.style.background = '';
                    ledIndicatorEl.style.color = '';
                    
                    buzzerStatusEl.textContent = '--';
                    buzzerStatusEl.className = 'led-pill led-off';
                    buzzerStatusEl.style.background = '';
                    buzzerStatusEl.style.color = '';
                }

                // 更新时间
                const ts = data.updatedAt ? new Date(data.updatedAt) : new Date();
                document.getElementById('last-updated-time').textContent = formatRelativeTime(ts);
            } catch (e) {
                setConnIndicator(false);
                document.getElementById('last-updated-time').textContent = '连接中…';
            }
        }

        // 定时刷新
        setInterval(refresh, 3000);
        refresh();
    </script>
</body>

</html>
